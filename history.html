<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — Weekly Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── Auth guard flicker prevention ── */
        body { visibility: hidden; }
        body.ready { visibility: visible; }

        .table-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 20px;
        }

        .table-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
        }

        .table-card-header h3 {
            font-size: 13px;
            font-weight: 600;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: 500;
        }
        
        .btn-primary-sm {
            background: var(--accent);
            color: #fff;
        }

        .btn-secondary-sm {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary-sm:hover {
            background: var(--bg-hover);
        }

        /* ── View Popup Modal ── */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .popup-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .popup-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: left;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .popup-overlay.show .popup-box {
            transform: scale(1) translateY(0);
        }
        .popup-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-close-icon {
            cursor: pointer;
            color: var(--text-muted);
        }
        .popup-close-icon:hover {
            color: var(--text-primary);
        }
        .report-field {
            margin-bottom: 16px;
        }
        .report-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .report-field div {
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-elevated);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-4l-3 9L9 3l-3 9H2'/></svg>">
</head>
<body>
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.userOnly()) { /* redirecting */ }
    </script>

    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            WeeklyTracker
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="history.html" class="active">My Dashboard</a></li>
            <li><a href="form.html">Submit Report</a></li>
            <li><a href="tracker.html">Tracker</a></li>
            <li><a href="teams.html">Teams</a></li>
        </ul>
        <div class="navbar-right">
            <button id="sendReportBtn" class="action-btn" style="background: var(--accent); color: white; border-color: var(--accent);">Director Report</button>
            <div class="week-badge" id="weekBadgeNav">—</div>
            <button class="theme-btn" onclick="location.reload()" title="Refresh Dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </button>
            <button id="themeToggle" class="theme-btn" title="Toggle theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                </svg>
            </button>
            <div class="profile-avatar" id="profileAvatar" title="">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/>
                </svg>
            </div>
            <button class="action-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="dashboard">
        <div class="hero-section">
            <h1>My Dashboard</h1>
            <p>View your submission history and import previous reports</p>
        </div>

        <div class="table-card">
            <div class="table-card-header">
                <h3>Submission History</h3>
                <a href="form.html" class="btn-sm btn-primary-sm" style="text-decoration: none; padding: 8px 16px;">Submit Report for This Week</a>
            </div>
            
            <div id="historyLoading" style="padding: 30px; text-align: center;">
                <div class="spinner spinner-md" style="margin: 0 auto 10px;"></div>
                <div style="color: var(--text-muted); font-size: 14px;">Loading your history...</div>
            </div>

            <table class="tracker-table" id="historyTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Week ID</th>
                        <th>Status</th>
                        <th style="width: 80px;"></th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- Dynamic rows here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ── View Modal Popup ── -->
    <div class="popup-overlay" id="viewModal">
        <div class="popup-box">
            <div class="popup-title">
                <span id="viewModalTitle">Report Details</span>
                <span class="popup-close-icon" id="viewModalClose">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </span>
            </div>
            <div class="report-field">
                <label>Work Done</label>
                <div id="viewWorkDone"></div>
            </div>
            <div class="report-field">
                <label>Work In Progress</label>
                <div id="viewWip"></div>
            </div>
            <div class="report-field">
                <label>Plans For Next Week</label>
                <div id="viewPlanned"></div>
            </div>
            <div class="report-field">
                <label>Achievements</label>
                <div id="viewAchievements"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('logoutBtn')?.addEventListener('click', () => Auth.logout());
        Auth.applyRoleUI();
        (function () {
            const user = Auth.getUser();
            const avatar = document.getElementById('profileAvatar');
            if (avatar && user.email) { avatar.title = user.email; }
        })();
    </script>
    <script src="js/history.js"></script>
</body>
</html>
