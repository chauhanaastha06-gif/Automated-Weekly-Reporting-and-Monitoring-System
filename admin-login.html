<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-4l-3 9L9 3l-3 9H2'/></svg>">
</head>

<body>

    <main class="dashboard">

        <div class="hero-section">
            <h1>Administrator Access</h1>
            <p>Authorized personnel only</p>
        </div>

        <section class="tracker-section">

            <div class="form-group">

                <label>Username</label>

                <input
                    type="text"
                    id="adminUsername"
                    placeholder="Enter username"
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="adminPassword"
                    placeholder="Enter password"
                >

            </div>

            <button
                class="btn-submit"
                id="adminLoginBtn"
            >
                Login
            </button>

        </section>

    </main>

    <script src="js/admin-login.js"></script>

</body>
</html>
