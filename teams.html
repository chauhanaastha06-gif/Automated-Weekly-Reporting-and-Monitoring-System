<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Tracker - Teams</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-4l-3 9L9 3l-3 9H2'/></svg>">
</head>

<body>
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.adminOnly()) { /* redirecting */ }
    </script>

    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            WeeklyTracker
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="history.html">My Dashboard</a></li>
            <li><a href="form.html">Submit Report</a></li>
            <li><a href="tracker.html">Tracker</a></li>
            <li><a href="teams.html" class="active">Teams</a></li>
        </ul>
        <div class="navbar-right">
            <button id="sendReportBtn" class="action-btn" style="background: var(--accent); color: white; border-color: var(--accent);">Director Report</button>
            <div class="week-badge" id="weekBadgeNav">—</div>
            <button class="theme-btn" onclick="location.reload()" title="Refresh Dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </button>
            <button id="themeToggle" class="theme-btn" title="Toggle theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                </svg>
            </button>
            <!-- Profile icon -->
            <div class="profile-avatar" id="profileAvatar" title="">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/>
                </svg>
            </div>
            <button id="logoutBtn" class="action-btn">Logout</button>
        </div>
    </nav>

    <main class="dashboard">

        <div class="hero-section">
            <h1>Teams Overview</h1>
            <p>All departments and reporting status</p>
        </div>

        <section class="tracker-section">

            <table class="tracker-table">

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Team</th>
                        <th>Leader</th>
                        <th>Email</th>
                    </tr>
                </thead>

                <tbody id="managerTeamsTableBody">
                    <tr><td colspan="5"><div class="section-loader"><div class="spinner"></div> Loading teams data…</div></td></tr>
                </tbody>

            </table>

        </section>

    </main>

    <script src="js/app.js"></script>
    <script>

        document.getElementById('logoutBtn')?.addEventListener('click', () => Auth.logout());
        Auth.applyRoleUI();
        (function () {
            const user = Auth.getUser();
            const avatar = document.getElementById('profileAvatar');
            if (avatar && user.email) { avatar.title = user.email; }
        })();
    </script>

</body>
</html>
